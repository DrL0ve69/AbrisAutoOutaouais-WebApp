name: Azure Static Web Apps

# Déploiement du frontend bilingue (fr « / » + en « /en/ ») sur Azure Static Web Apps.
# - push sur master  → environnement de PRODUCTION
# - pull request     → environnement de PRÉVISUALISATION éphémère (≈ « staging » gratuit)
#
# Inerte tant que le secret `AZURE_STATIC_WEB_APPS_API_TOKEN` n'est pas défini :
# l'étape de déploiement se saute (workflow vert), seul le build s'exécute.
# Mise en place : voir docs/deployment.md §4.

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

jobs:
  build_and_deploy:
    name: Build & Deploy
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/AbrisAutoOutaouais-WebApp.Client/package-lock.json

      - name: Install & build localisé (fr + en)
        working-directory: src/AbrisAutoOutaouais-WebApp.Client
        run: |
          npm ci
          npm run build:i18n

      - name: Deploy to Azure Static Web Apps
        if: ${{ env.SWA_TOKEN != '' }}
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Build déjà produit ci-dessus → on désactive Oryx et on publie le dossier localisé.
          skip_app_build: true
          skip_api_build: true
          app_location: src/AbrisAutoOutaouais-WebApp.Client/dist/abristempo-client/browser
          output_location: ''

  close_pull_request:
    name: Close PR preview environment
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Close preview environment
        if: ${{ env.SWA_TOKEN != '' }}
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: close
