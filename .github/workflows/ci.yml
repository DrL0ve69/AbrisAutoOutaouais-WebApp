name: CI

# Pipeline d'intégration continue — exécuté à chaque push et pull request.
# Démontre l'intégration des tests (dont l'accessibilité via axe) dans un cycle Agile :
# build + tests unitaires backend, build + tests navigateur (Vitest/Playwright) frontend.

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — build & tests unitaires (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build (Release)
        run: dotnet build --no-restore -c Release
      # Les tests d'intégration nécessitent SQL Server LocalDB (Windows) — exécutés localement.
      - name: Tests unitaires
        run: dotnet test AbrisAutoOutaouais-WebApp.UnitTest/AbrisAutoOutaouais-WebApp.UnitTest.csproj --no-build -c Release

  frontend:
    name: Frontend — build, i18n & tests d'accessibilité (Angular 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/AbrisAutoOutaouais-WebApp.Client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/AbrisAutoOutaouais-WebApp.Client/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Chromium (Playwright)
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Tests unitaires + accessibilité (Vitest navigateur + axe-core)
        run: npm test
      - name: Tests e2e d'accessibilité (Playwright + axe-core)
        run: npm run e2e
