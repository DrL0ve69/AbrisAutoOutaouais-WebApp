name: Azure Container Apps (API)

# Déploiement de l'API .NET 10 en conteneur sur Azure Container Apps.
# - push sur master (chemins backend/Dockerfile) → build image (SDK .NET) + mise à jour de l'app
# - workflow_dispatch → déclenchement manuel
#
# ⚠️ ACR Tasks (`az acr build`) est DÉSACTIVÉ sur l'abonnement étudiant
# (TasksOperationsNotAllowed) → l'image est construite avec `dotnet publish /t:PublishContainer`
# (SDK .NET, le runner a Docker pour `az acr login` + le push) puis déployée via
# `az containerapp update`. Pour un déploiement LOCAL sans CI, voir `infra/deploy-backend.ps1`.
#
# Inerte tant que le secret `AZURE_CREDENTIALS` n'est pas défini : les étapes Azure se sautent
# (workflow vert, sans déploiement). Mise en place : voir docs/deployment.md §4.2.

on:
  push:
    branches: [master]
    paths:
      - 'src/AbrisAutoOutaouais-WebApp.API/**'
      - 'src/AbrisAutoOutaouais-WebApp.Application/**'
      - 'src/AbrisAutoOutaouais-WebApp.Infrastructure/**'
      - 'src/AbrisAutoOutaouais-WebApp.Domain/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/azure-container-app.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      # Noms surchargeables via variables de dépôt (Settings → Variables) ; défauts ci-dessous.
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'abristempo-rg' }}
      ACR_NAME: ${{ vars.AZURE_ACR_NAME || 'abristempoacr' }}
      CONTAINERAPP_NAME: ${{ vars.AZURE_CONTAINERAPP_NAME || 'abristempo-api' }}
      IMAGE_NAME: abristempo-api
    steps:
      - uses: actions/checkout@v4

      - name: Déploiement sauté (non configuré)
        if: ${{ env.AZURE_CREDENTIALS == '' }}
        run: echo "Secret AZURE_CREDENTIALS absent → étapes Azure sautées (workflow vert). Déploiement local : infra/deploy-backend.ps1. Voir docs/deployment.md §4.2."

      - name: Setup .NET 10
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Azure login
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Connexion à l'ACR (le runner a Docker → écrit les creds de push)
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: az acr login --name "$ACR_NAME"

      - name: Build + push de l'image (SDK .NET — PAS d'ACR Tasks)
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          dotnet publish src/AbrisAutoOutaouais-WebApp.API/AbrisAutoOutaouais-WebApp.API.csproj \
            -c Release --os linux --arch x64 /t:PublishContainer \
            -p:ContainerRegistry="$ACR_NAME.azurecr.io" \
            -p:ContainerRepository="$IMAGE_NAME" \
            -p:ContainerImageTags='"${{ github.sha }};latest"'

      - name: Mise à jour de la Container App
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add -n containerapp --upgrade --only-show-errors
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"
