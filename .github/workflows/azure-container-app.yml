name: Azure Container Apps (API)

# Déploiement de l'API .NET 10 en conteneur sur Azure Container Apps.
# - push sur master (chemins backend/Dockerfile) → build image (ACR Tasks) + mise à jour de l'app
# - workflow_dispatch → déclenchement manuel
#
# Inerte tant que le secret `AZURE_CREDENTIALS` n'est pas défini : les étapes Azure se sautent
# (workflow vert, sans déploiement). Mise en place : voir docs/deployment.md §4.2.

on:
  push:
    branches: [master]
    paths:
      - 'src/AbrisAutoOutaouais-WebApp.API/**'
      - 'src/AbrisAutoOutaouais-WebApp.Application/**'
      - 'src/AbrisAutoOutaouais-WebApp.Infrastructure/**'
      - 'src/AbrisAutoOutaouais-WebApp.Domain/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/azure-container-app.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      # Noms surchargeables via variables de dépôt (Settings → Variables) ; défauts ci-dessous.
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'abristempo-rg' }}
      ACR_NAME: ${{ vars.AZURE_ACR_NAME || 'abristempoacr' }}
      CONTAINERAPP_NAME: ${{ vars.AZURE_CONTAINERAPP_NAME || 'abristempo-api' }}
      IMAGE_NAME: abristempo-api
    steps:
      - uses: actions/checkout@v4

      - name: Déploiement sauté (non configuré)
        if: ${{ env.AZURE_CREDENTIALS == '' }}
        run: echo "Secret AZURE_CREDENTIALS absent → étapes Azure sautées (workflow vert). Voir docs/deployment.md §4.2."

      - name: Azure login
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Build de l'image dans ACR (ACR Tasks — aucun Docker sur le runner)
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:${{ github.sha }}" \
            --image "$IMAGE_NAME:latest" \
            --file Dockerfile .

      - name: Mise à jour de la Container App
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add -n containerapp --upgrade --only-show-errors
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"
