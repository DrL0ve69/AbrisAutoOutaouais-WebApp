<!-- Skip navigation — doit être le PREMIER élément interactif de la page (WCAG 2.4.1) -->
<app-skip-nav />

<!-- Région d'en-tête avec rôle banner -->
<header role="banner">
  <app-navbar />
</header>

<!-- Contenu principal — id="main" ciblé par le skip nav -->
<main id="main" tabindex="-1">
  <!-- tabindex="-1" permet à skip-nav de mettre le focus ici via JS -->
  <router-outlet />
</main>

<!-- Pied de page avec rôle contentinfo -->
<footer role="contentinfo">
  <app-footer />
</footer>

<!-- Région live globale : confirme le changement de langue après rechargement
     (H1). Présente dès le chargement (vide) puis renseignée une fois → annonce
     polie par les lecteurs d'écran. -->
<div class="sr-only" role="status" aria-live="polite" aria-atomic="true">
  {{ locale.switchAnnouncement() }}
</div>

<!-- Micro-interactions globales (E3) — montées après le footer, hors flux sémantique.
     Le loading-overlay porte SON PROPRE role="status" (second nœud status global) : voir
     L-010, les locators e2e/spec status sont tous scopés par texte. -->
<app-loading-overlay />
<app-cursor-ring />
