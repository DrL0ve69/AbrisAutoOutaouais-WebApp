<div class="dimension">
  <!-- Choix de la voie : radiogroup APG à 3 voies (roving tabindex + flèches/Home/End, L-015).
       Nom accessible STATIQUE et non vide (L-040). -->
  <div
    class="dimension__methods"
    role="radiogroup"
    aria-label="Comment souhaitez-vous obtenir vos dimensions ?"
    i18n-aria-label="@@mesurer.dimension.group">
    @for (m of methods; track m) {
    <button
      #methodRadio
      type="button"
      class="dimension__method"
      [class.dimension__method--active]="method() === m"
      role="radio"
      [attr.aria-checked]="method() === m"
      [attr.tabindex]="method() === m ? 0 : -1"
      (click)="setMethod(m)"
      (keydown)="onMethodKeydown($event)">
      {{ methodLabels[m] }}
    </button>
    }
  </div>

  @switch (method()) {
    @case ('known') {
    <app-known-dimensions (footprintComputed)="onFootprint($event)" />
    }
    @case ('vehicles') {
    <app-vehicle-calculator (footprintComputed)="onFootprint($event)" />
    }
    @case ('map') {
    <!-- L'utilisateur a explicitement choisi le mode carte → on charge immédiatement le chunk
         différé (Leaflet/geoman/turf reste hors du bundle initial, SSR-safe). `on immediate`
         (et non `on viewport`) : déclenchement déterministe pour l'e2e. NOTE 13.2 : l'adresse
         (lat/lng pour centrer) arrive dans cette voie en 13.2 ; pour l'instant null → repli. -->
    @defer (on immediate) {
    <app-map-measure [lat]="null" [lng]="null" (footprintComputed)="onFootprint($event)" />
    } @placeholder {
    <div class="dimension__map-placeholder">
      <p i18n="@@mesurer.dimension.mapPlaceholder">Préparation de la carte satellite…</p>
    </div>
    } @loading {
    <div class="dimension__map-loading" aria-busy="true">
      <p i18n="@@mesurer.dimension.mapLoading">Chargement de la carte…</p>
    </div>
    }
    }
  }
</div>
