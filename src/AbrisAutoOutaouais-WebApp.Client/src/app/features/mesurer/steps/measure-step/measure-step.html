<div class="measure">
  <!-- Choix de méthode : calculateur (clavier, défaut) ⇄ carte (pointer). -->
  <div class="measure__methods" role="radiogroup" aria-label="Méthode de mesure" i18n-aria-label="@@mesurer.method.group">
    <button
      #methodRadio
      type="button"
      class="measure__method"
      [class.measure__method--active]="method() === 'calculator'"
      role="radio"
      [attr.aria-checked]="method() === 'calculator'"
      [attr.tabindex]="method() === 'calculator' ? 0 : -1"
      (click)="setMethod('calculator')"
      (keydown)="onMethodKeydown($event)"
      i18n="@@mesurer.method.calculator">
      Calculateur de véhicules
    </button>
    <button
      #methodRadio
      type="button"
      class="measure__method"
      [class.measure__method--active]="method() === 'map'"
      role="radio"
      [attr.aria-checked]="method() === 'map'"
      [attr.tabindex]="method() === 'map' ? 0 : -1"
      (click)="setMethod('map')"
      (keydown)="onMethodKeydown($event)"
      i18n="@@mesurer.method.map">
      Mesurer sur la carte
    </button>
  </div>

  @if (method() === 'calculator') {
  <app-vehicle-calculator (footprintComputed)="onFootprint($event)" />
  } @else {
  <!-- L'utilisateur a explicitement choisi le mode carte → on charge immédiatement le chunk
       différé (Leaflet/geoman/turf reste hors du bundle initial, SSR-safe). `on immediate`
       (et non `on viewport`) : pas de scroll requis après la sélection, et déclenchement
       déterministe pour l'e2e (l'IntersectionObserver de `on viewport` ne se déclenchait pas
       de façon fiable en CI headless). -->
  @defer (on immediate) {
  <app-map-measure [lat]="lat()" [lng]="lng()" (footprintComputed)="onFootprint($event)" />
  } @placeholder {
  <div class="measure__map-placeholder">
    <p i18n="@@mesurer.method.mapPlaceholder">Préparation de la carte satellite…</p>
  </div>
  } @loading {
  <div class="measure__map-loading" aria-busy="true">
    <p i18n="@@mesurer.method.mapLoading">Chargement de la carte…</p>
  </div>
  }
  }
</div>
