# ============================================================
# SonarCloud — réglages d'analyse (Automatic Analysis)
# ============================================================
# Périmètre de la détection de copier-coller (CPD) et de l'analyse.

# Fichiers de DONNÉES de traduction (XLIFF) : artefacts générés par
# `ng extract-i18n` (source) et catalogues de cibles maintenus à la main, à la
# structure volontairement répétitive (<trans-unit><source><target>). Ce ne sont
# pas du code → exclus de l'analyse (et donc de la duplication).
sonar.exclusions=**/src/locale/*.xlf

# Specs e2e (Playwright) et tests unitaires (vitest) : l'échafaudage est
# répétitif par nature (mock d'API, blocs axe « analyze + expect([]) » par page).
# On exclut ces fichiers de la détection de duplication, pas de l'analyse.
sonar.cpd.exclusions=**/e2e/**,**/*.spec.ts
