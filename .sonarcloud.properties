# ============================================================
# SonarCloud — Automatic Analysis (lu depuis .sonarcloud.properties)
# ============================================================

# Fichiers de DONNÉES de traduction (XLIFF) : artefacts de `ng extract-i18n`
# (source) et catalogues de cibles, à la structure volontairement répétitive
# (<trans-unit><source><target>). Ce ne sont pas du code → hors analyse.
# + Infrastructure as Code (Terraform + script de déploiement) : blocs de
# ressources volontairement répétitifs (env/tags/resource) et compromis assumés
# et documentés (admin ACR pour le push, pare-feu « services Azure » 0.0.0.0,
# réseau public) → hors quality gate applicative (l'IaC n'est pas du code app).
sonar.exclusions=**/src/locale/*.xlf,infra/**

# Specs e2e (Playwright) et tests unitaires (vitest) : échafaudage répétitif par
# nature (mock d'API, blocs axe « analyze + expect([]) » par page) → hors
# détection de copier-coller (mais toujours analysés pour le reste).
sonar.cpd.exclusions=**/e2e/**,**/*.spec.ts
